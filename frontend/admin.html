<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunset Motel Admin</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="site-header">
    <div class="logo">
      <a href="index.html">
        <img src="logo.png" alt="Sunset Motel Logo">
      </a>
    </div>

    <nav>
      <a href="index.html">Website</a>
      <a href="admin.html" class="btn">Admin</a>
    </nav>
  </header>

  <section class="availability-results">
    <h2>Booking Admin</h2>
    <p>View and manage motel bookings.</p>

    <div class="guest-booking-form" id="adminLoginForm" style="display: block;">
      <h2>Admin Login</h2>
      <p id="adminLoginMessage"></p>

      <form onsubmit="adminLogin(event)">
        <div>
          <label>Username</label>
          <input type="text" id="adminUsername" required>
        </div>

        <div>
          <label>Password</label>
          <input type="password" id="adminPassword" required>
        </div>

        <button type="submit">Login</button>
      </form>
    </div>

    <div id="adminControls" style="display: none;">
      <p id="adminStatusMessage">Logged in as admin.</p>

      <div class="admin-search">
        <label for="adminSearchInput">Search Bookings</label>
        <input
          type="text"
          id="adminSearchInput"
          placeholder="Search by guest, email, phone, booking ID, or room"
          oninput="renderFilteredBookings()"
        >
      </div>

      <button onclick="loadBookings('ALL')">Show All</button>
      <button onclick="loadBookings('CONFIRMED')">Show Confirmed</button>
      <button onclick="loadBookings('CANCELLED')">Show Cancelled</button>
      <button onclick="adminLogout()">Logout</button>

      <div class="available-room-grid" id="adminBookingGrid"></div>

      <hr>

   <section class="availability-results">
  <h2>Room Management</h2>
  <p>View motel rooms currently stored in the database.</p>

  <div class="guest-booking-form" style="display: block;">
    <h2>Add Room</h2>
    <p id="addRoomMessage"></p>

    <form onsubmit="submitNewRoom(event)">
      <div>
        <label>Room Number</label>
        <input type="text" id="newRoomNumber" required>
      </div>

      <div>
        <label>Room Type</label>
        <input type="text" id="newRoomType" required>
      </div>

      <div>
        <label>Price Per Night</label>
        <input type="number" id="newRoomPrice" min="1" step="0.01" required>
      </div>

      <div>
        <label>Max Guests</label>
        <input type="number" id="newRoomMaxGuests" min="1" required>
      </div>

      <div>
        <label>Description</label>
        <input type="text" id="newRoomDescription" required>
      </div>

      <button type="submit">Add Room</button>
    </form>
  </div>

  <button onclick="loadAdminRooms()">Load Rooms</button>

  <div class="available-room-grid" id="adminRoomGrid"></div>
</section>
    </div>
  </section>

  <script src="admin.js"></script>
</body>

</html>
